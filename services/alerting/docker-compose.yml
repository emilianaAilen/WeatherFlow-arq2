version: '3.8'

services:
  app:
    build: .
    container_name: alerting-app
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      MONGODB_URI: ${MONGODB_URI}
      MONGODB_DB_NAME: ${MONGODB_DB_NAME:-weatherflow}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - alerting-network
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: alerting-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alerting-network
    restart: unless-stopped

networks:
  alerting-network:
    driver: bridge
