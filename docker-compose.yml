version: "3.8"

services:
  # ==========================================
  # INFRAESTRUCTURA
  # ==========================================
  mongodb:
    image: mongo:6
    container_name: weatherflow-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-secret}
    volumes:
      - mongo_data:/data/db
    networks:
      - weatherflow-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: weatherflow-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692" # Prometheus metrics
    environment:
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: -rabbitmq_prometheus return_per_object_metrics true
    volumes:
      - ./observability/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - weatherflow-network

  # ==========================================
  # MICROSERVICIOS
  # ==========================================
  alerting:
    build:
      context: ./services/alerting
    container_name: weatherflow-alerting
    ports:
      - "${PORT_ALERTING:-4001}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      MONGODB_URI: mongodb://${MONGO_USER:-admin}:${MONGO_PASS:-secret}@mongodb:27017/alerting?authSource=admin
      RABBITMQ_URL: amqp://rabbitmq:5672
      OTEL_SERVICE_NAME: alerting
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
    depends_on:
      mongodb:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - weatherflow-network
    restart: unless-stopped

  station_management:
    build:
      context: ./services/station_management
    container_name: weatherflow-stations
    ports:
      - "${PORT_STATIONS:-4000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      MONGODB_URI: mongodb://${MONGO_USER:-admin}:${MONGO_PASS:-secret}@mongodb:27017/station_management?authSource=admin
      RABBITMQ_URL: amqp://rabbitmq:5672
      OTEL_SERVICE_NAME: station_management
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
    depends_on:
      mongodb:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - weatherflow-network
    restart: unless-stopped

  ingesting:
    build:
      context: ./services/ingesting
    container_name: weatherflow-ingesting
    ports:
      - "${PORT_INGESTING:-4002}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      MONGODB_URI: mongodb://${MONGO_USER:-admin}:${MONGO_PASS:-secret}@mongodb:27017/ingesting?authSource=admin
      RABBITMQ_URL: amqp://rabbitmq:5672
      OWM_API_KEY: ${OWM_API_KEY}
      OWM_CRON: ${OWM_CRON:-*/5 * * * *}
      OWM_BASE_URL: ${OWM_BASE_URL:-https://api.openweathermap.org/data/2.5}
      OWM_TIMEOUT_MS: ${OWM_TIMEOUT_MS:-5000}
      OTEL_SERVICE_NAME: ingesting
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
    depends_on:
      mongodb:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - weatherflow-network
    restart: unless-stopped

  ui:
    build:
      context: ./ui
      args:
        VITE_STATION_MANAGEMENT_URL: ${VITE_STATION_MANAGEMENT_URL:-http://localhost:4000}
        VITE_ALERTING_URL: ${VITE_ALERTING_URL:-http://localhost:4001}
    container_name: weatherflow-ui
    ports:
      - "3000:3000"
    depends_on:
      - station_management
      - alerting
    networks:
      - weatherflow-network
    restart: unless-stopped

  # ==========================================
  # OBSERVABILIDAD
  # ==========================================
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: weatherflow-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    networks:
      - weatherflow-network

  loki:
    image: grafana/loki:2.9.7
    container_name: weatherflow-loki
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - weatherflow-network

  promtail:
    image: grafana/promtail:2.9.7
    container_name: weatherflow-promtail
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./observability/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - weatherflow-network

  tempo:
    image: grafana/tempo:2.4.2
    container_name: weatherflow-tempo
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "3200:3200"   # Tempo HTTP API
    volumes:
      - ./observability/tempo/tempo-config.yml:/etc/tempo/config.yml:ro
      - tempo_data:/tmp/tempo
    command: -config.file=/etc/tempo/config.yml
    networks:
      - weatherflow-network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: weatherflow-cadvisor
    privileged: true
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - weatherflow-network

  grafana:
    image: grafana/grafana:10.4.2
    container_name: weatherflow-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - weatherflow-network

networks:
  weatherflow-network:
    driver: bridge

volumes:
  mongo_data:
  prometheus_data:
  loki_data:
  tempo_data:
  grafana_data:
