global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: alerting
    static_configs:
      - targets: ['alerting:3000']
        labels:
          service: alerting

  - job_name: station_management
    static_configs:
      - targets: ['station_management:3000']
        labels:
          service: station_management

  - job_name: ingesting
    static_configs:
      - targets: ['ingesting:3000']
        labels:
          service: ingesting

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: rabbitmq
    static_configs:
      - targets: ['rabbitmq:15692']
