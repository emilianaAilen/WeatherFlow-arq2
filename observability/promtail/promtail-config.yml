server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: weatherflow-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.project"]
    relabel_configs:
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: service
      - source_labels: ['__meta_docker_container_name']
        regex: '/?(.*)'
        target_label: container
      - source_labels: ['__meta_docker_container_id']
        target_label: '__path__'
        replacement: '/var/lib/docker/containers/$1/$1-json.log'
    pipeline_stages:
      # Docker wraps each log line in JSON: {"log":"<content>\n","stream":"stdout","time":"..."}
      - json:
          expressions:
            log_line: log
      # Parse the inner Pino JSON to extract structured fields
      - json:
          source: log_line
          expressions:
            level: level
            traceId: traceId
      - labels:
          level:
          traceId:
      - output:
          source: log_line
