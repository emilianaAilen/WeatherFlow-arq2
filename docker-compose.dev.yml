version: "3.8"

services:
  # ==========================================
  # INFRAESTRUCTURA
  # ==========================================
  mongodb:
    image: mongo:6
    container_name: weatherflow-mongo-dev
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secret-password-123
    ports:
      - "27017:27017"
    volumes:
      - mongo_data_dev:/data/db

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: weatherflow-rabbitmq-dev
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692"
    volumes:
      - ./observability/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 5s
      timeout: 5s
      retries: 5

  # ==========================================
  # MICROSERVICIOS EN MODO DESARROLLO
  # ==========================================
  alerting:
    build:
      context: ./services/alerting
      target: builder
    container_name: weatherflow-alerting-dev
    ports:
      - "${PORT_ALERTING:-4001}:3000"
    volumes:
      - ./services/alerting:/app
    env_file:
      - ./services/alerting/.env
    command: sh -c "npm install && npm run dev"
    depends_on:
      mongodb:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  station_management:
    build:
      context: ./services/station_management
      target: builder
    container_name: weatherflow-stations-dev
    ports:
      - "${PORT_STATIONS:-4000}:3000"
    volumes:
      - ./services/station_management:/app
    env_file:
      - ./services/station_management/.env
    command: sh -c "npm install && npm run dev"
    depends_on:
      mongodb:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  ingesting:
    build:
      context: ./services/ingesting
      target: builder
    container_name: weatherflow-ingesting-dev
    ports:
      - "${PORT_INGESTING:-4002}:3000"
    volumes:
      - ./services/ingesting:/app
    env_file:
      - ./services/ingesting/.env
    command: sh -c "npm install && npm run dev"
    depends_on:
      mongodb:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  ui:
    build:
      context: ./ui
      target: dev
    container_name: weatherflow-ui-dev
    ports:
      - "3000:3000"
    volumes:
      - ./ui:/app
    environment:
      VITE_STATION_MANAGEMENT_URL: ${VITE_STATION_MANAGEMENT_URL:-http://localhost:4000}
      VITE_ALERTING_URL: ${VITE_ALERTING_URL:-http://localhost:4001}
    command: sh -c "npm install && npm run dev"
    depends_on:
      - station_management
      - alerting

  # ==========================================
  # OBSERVABILIDAD
  # ==========================================
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: weatherflow-prometheus-dev
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data_dev:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'

  loki:
    image: grafana/loki:2.9.7
    container_name: weatherflow-loki-dev
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data_dev:/loki
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:2.9.7
    container_name: weatherflow-promtail-dev
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./observability/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  tempo:
    image: grafana/tempo:2.4.2
    container_name: weatherflow-tempo-dev
    ports:
      - "4317:4317"
      - "4318:4318"
      - "3200:3200"
    volumes:
      - ./observability/tempo/tempo-config.yml:/etc/tempo/config.yml:ro
      - tempo_data_dev:/tmp/tempo
    command: -config.file=/etc/tempo/config.yml

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: weatherflow-cadvisor-dev
    privileged: true
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro

  grafana:
    image: grafana/grafana:10.4.2
    container_name: weatherflow-grafana-dev
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: false
    volumes:
      - grafana_data_dev:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
      - tempo

volumes:
  mongo_data_dev:
  prometheus_data_dev:
  loki_data_dev:
  tempo_data_dev:
  grafana_data_dev:
